<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>展示会まるごとサポート｜販促係長（一向社）</title>
<meta name="description" content="企画・ツール制作・設営・アフターフォローまで。販促係長が御社のチームの一員として伴走します。" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root {
  --accent: #FF6B2B;
  --accent-2: #FFB085;
  --primary: #005599;
  --primary-50: #F0F7FF;
  --primary-100: #E8F2FB;
  --primary-200: #B3D4EF;
  --primary-300: #7AAAC8;
  --ink: #0F172A;
  --ink-2: #334155;
  --ink-3: #64748B;
  --line: #CBD5E1;
  --line-2: #E2E8F0;
  --bg: #FFFFFF;
  --bg-2: #F1F5F9;
  --bg-3: #FAFAFA;
  --success: #16A34A;
  --success-bg: #F0FDF4;
  --success-ring: #4ADE80;
  --danger: #DC2626;
  --danger-bg: #FEF2F2;
  --danger-ring: #EF4444;
  --warm-bg: #FFF3EE;
  --warm-ring: #FFD4B8;
  --warm-ink: #C2440A;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "Noto Sans JP", "Inter", system-ui, sans-serif;
  color: var(--ink);
  background: #fff;
  -webkit-font-smoothing: antialiased;
  line-height: 1.7;
}
button { font-family: inherit; cursor: pointer; border: 0; background: 0; padding: 0; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

.container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 999px;
  background: var(--primary-100); border: 1px solid var(--primary-200);
  color: var(--primary); font-size: 11px; font-weight: 700; letter-spacing: .12em;
}
.pill--warm { background: rgba(255,107,43,.15); border-color: rgba(255,107,43,.45); color: var(--accent); }
.section-title { font-size: clamp(26px, 3vw, 36px); font-weight: 700; text-align: center; color: var(--ink); margin: 16px 0 18px; line-height: 1.35; letter-spacing: .01em; }
.section-sub { text-align: center; color: var(--ink-3); font-size: 14px; margin: 0 auto; max-width: 640px; line-height: 1.9; }

.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(0,30,65,.88); backdrop-filter: blur(12px); box-shadow: inset 0 -1px 0 rgba(255,255,255,.08); height: 64px; }
.nav__inner { max-width: 1920px; margin: 0 auto; height: 100%; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
.brand { display: flex; align-items: center; gap: 10px; color: #fff; }
.brand__mark { width: 36px; height: 36px; border-radius: 8px; background: var(--primary); display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 18px; }
.brand__name { font-weight: 700; font-size: 17px; letter-spacing: .06em; }
.nav__links { display: flex; gap: 28px; }
.nav__links a { color: rgba(255,255,255,.82); font-size: 13px; font-weight: 500; transition: color .15s; }
.nav__links a:hover { color: #fff; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 999px; font-weight: 700; font-size: 13px; transition: transform .15s, box-shadow .15s, background .15s; white-space: nowrap; }
.btn--primary { background: var(--accent); color: #fff; box-shadow: 0 4px 16px rgba(255,107,43,.45); }
.btn--primary:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(255,107,43,.55); }
.btn--lg { padding: 18px 30px; font-size: 14px; border-radius: 12px; letter-spacing: .04em; }
.btn--xl { padding: 22px 32px; font-size: 15px; border-radius: 8px; letter-spacing: .04em; width: 100%; justify-content: center; }
.btn--ghost { border: 2px solid rgba(255,255,255,.38); color: #fff; padding: 16px 22px; border-radius: 12px; font-size: 14px; }
.btn--ghost:hover { background: rgba(255,255,255,.08); }
.btn--white { background: #fff; color: var(--primary); border-radius: 12px; padding: 16px 24px; box-shadow: 0 4px 20px rgba(0,0,0,.1); }

.hero { position: relative; overflow: hidden; color: #fff; padding: 120px 0 100px;
  background: radial-gradient(ellipse at 75% 25%, rgba(0,120,200,.4), transparent 55%), radial-gradient(ellipse at 15% 85%, rgba(0,50,100,.7), transparent 60%), linear-gradient(135deg, #001E41 0%, #003366 50%, #00558C 100%); }
.hero__grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px); background-size: 48px 48px; mask-image: radial-gradient(ellipse at 50% 50%, #000 35%, transparent 80%); }
.hero__inner { position: relative; max-width: 1120px; margin: 0 auto; padding: 0 24px; display: grid; grid-template-columns: 1.05fr .95fr; gap: 56px; align-items: center; }
.hero__eyebrow { display: inline-flex; align-items: center; gap: 10px; padding: 6px 14px; border-radius: 999px; background: rgba(255,107,43,.18); border: 1px solid rgba(255,107,43,.45); color: #FFD4B8; font-size: 11px; font-weight: 700; letter-spacing: .14em; }
.hero__eyebrow .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.hero h1 { font-size: 48px; line-height: 1.28; letter-spacing: .01em; margin: 20px 0 22px; font-weight: 900; }
.hero h1 em { font-style: normal; color: var(--accent-2); }
.hero__lead { font-size: 17px; line-height: 1.9; color: rgba(255,255,255,.85); margin: 0 0 26px; font-weight: 500; }
.hero__checks { display: grid; gap: 10px; margin: 0 0 32px; }
.hero__check { display: flex; align-items: center; gap: 10px; font-size: 14px; color: rgba(255,255,255,.9); }
.hero__check .tick { display: grid; place-items: center; width: 20px; height: 20px; border-radius: 999px; background: rgba(74,222,128,.18); border: 1px solid rgba(74,222,128,.45); color: #4ADE80; font-size: 11px; font-weight: 700; }
.hero__cta { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
.hero__fineprint { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 18px; }
.hero__card { position: relative; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.18); border-radius: 22px; padding: 28px; backdrop-filter: blur(8px); }
.hero__cardRow { display: flex; justify-content: center; gap: 14px; align-items: flex-end; margin-bottom: 18px; }
.hero__chip { flex: 0 0 auto; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18); border-radius: 14px; padding: 14px 10px; min-width: 92px; text-align: center; font-size: 11px; color: #fff; font-weight: 700; display: grid; gap: 8px; justify-items: center; }
.hero__chip .ico { font-size: 22px; }
.hero__logo { background: var(--primary); color: #fff; border-radius: 10px 10px 0 0; padding: 14px 18px; font-size: 12px; font-weight: 700; letter-spacing: .06em; text-align: center; box-shadow: 0 8px 24px rgba(0,85,153,.4); }
.hero__logo small { display: block; font-size: 9px; opacity: .7; font-weight: 500; letter-spacing: .2em; margin-top: 2px; }
.hero__cardFoot { margin-top: 18px; padding-top: 18px; border-top: 1px dashed rgba(255,255,255,.16); text-align: center; font-size: 11px; color: rgba(255,255,255,.6); line-height: 1.7; }
.hero__stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; }
.hero__stat { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.15); border-radius: 14px; padding: 14px 12px; text-align: center; }
.hero__stat b { display: block; font-size: 22px; color: var(--accent-2); font-weight: 800; letter-spacing: .02em; }
.hero__stat span { display: block; font-size: 10px; color: rgba(255,255,255,.6); margin-top: 4px; letter-spacing: .1em; }

.section { padding: 96px 0; position: relative; }
.section--soft { background: var(--bg-2); }
.problems__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 48px 0 32px; }
.problem-card { background: #fff; border-radius: 18px; border: 1px solid var(--line); padding: 24px; display: flex; gap: 18px; align-items: flex-start; box-shadow: 0 1px 4px rgba(0,0,0,.05); transition: transform .2s, box-shadow .2s; }
.problem-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.07); }
.problem-card__icon { flex: 0 0 auto; width: 46px; height: 46px; border-radius: 11px; background: var(--danger-bg); display: grid; place-items: center; font-size: 22px; }
.problem-card h3 { margin: 0 0 6px; font-size: 15px; font-weight: 700; color: var(--ink); }
.problem-card p { margin: 0; font-size: 13px; color: var(--ink-3); line-height: 1.75; }
.problems__callout { margin-top: 24px; background: #fff; border-radius: 18px; padding: 32px; box-shadow: 0 1px 4px rgba(0,0,0,.07); border-left: 4px solid var(--accent); }
.problems__callout h3 { margin: 0 0 14px; font-size: 18px; font-weight: 700; color: var(--ink); line-height: 1.6; }
.problems__callout p { margin: 0 0 16px; font-size: 14px; color: var(--ink-2); line-height: 1.9; }
.problems__callout .quote { background: var(--bg-2); border-radius: 12px; padding: 18px 22px; font-size: 14px; font-weight: 700; color: var(--ink-2); line-height: 1.9; }

.solution { position: relative; overflow: hidden; color: #fff; padding: 88px 0 92px;
  background: radial-gradient(ellipse at 30% 40%, rgba(255,107,43,.16), transparent 50%), linear-gradient(135deg, #001E41 0%, #002B5E 100%); }
.solution__eyebrow { display: inline-flex; gap: 10px; align-items: center; background: rgba(255,107,43,.18); border: 1px solid rgba(255,107,43,.45); border-radius: 999px; padding: 6px 14px; color: #FFD4B8; font-size: 11px; font-weight: 700; letter-spacing: .14em; }
.solution__inner { text-align: center; position: relative; z-index: 1; }
.solution h2 { margin: 22px auto 18px; font-size: clamp(28px, 3.2vw, 42px); font-weight: 900; line-height: 1.4; letter-spacing: .02em; }
.solution h2 em { font-style: normal; color: var(--accent-2); }
.solution__lead { max-width: 700px; margin: 0 auto 32px; color: rgba(255,255,255,.78); font-size: 15px; line-height: 2; }
.solution__checks { display: inline-flex; gap: 28px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
.solution__check { display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,.9); font-size: 13px; font-weight: 700; }
.solution__check .tick { color: var(--success-ring); font-size: 16px; }

.service__hero { position: relative; margin: 56px auto 0; max-width: 1032px; }
.service__line { position: absolute; left: 10%; right: 10%; top: 36px; height: 2px; background: linear-gradient(90deg, transparent, var(--primary-200), var(--primary-200), transparent); z-index: 0; }
.service__steps { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; position: relative; z-index: 1; }
.step { display: flex; flex-direction: column; align-items: center; text-align: center; }
.step__bubble { width: 64px; height: 64px; border-radius: 50%; background: var(--primary); color: #fff; display: grid; place-items: center; font-size: 26px; border: 4px solid #fff; box-shadow: 0 4px 14px rgba(0,85,153,.32); margin-bottom: 12px; }
.step__title { font-weight: 700; color: var(--primary); font-size: 14px; margin-bottom: 14px; letter-spacing: .02em; }
.step__box { width: 100%; border-radius: 12px; padding: 14px; font-size: 12px; line-height: 1.7; text-align: left; min-height: 92px; }
.step__box--client { background: var(--bg-2); border: 1px solid var(--line); color: var(--ink-2); }
.step__box--us { background: var(--primary-50); border: 1px solid var(--primary-200); color: var(--primary); font-weight: 700; margin-top: 8px; }
.step__tag { font-size: 9px; font-weight: 700; letter-spacing: .1em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 6px; }
.step__tag--us { color: var(--primary); }
.service__banner { margin: 48px auto 0; max-width: 720px; border-radius: 20px;
  background: radial-gradient(ellipse at 80% 30%, rgba(255,107,43,.25), transparent 60%), linear-gradient(135deg, #011934, #003366);
  padding: 28px 32px; display: flex; justify-content: space-between; align-items: center; gap: 24px; color: #fff; box-shadow: 0 18px 42px rgba(0,0,0,.2); }
.service__banner h3 { margin: 0 0 6px; font-size: 17px; font-weight: 800; }
.service__banner p { margin: 0; font-size: 12px; color: rgba(255,255,255,.72); }

.compare { background: #fff; border-radius: 24px; overflow: hidden; max-width: 1032px; margin: 48px auto 0; box-shadow: 0 4px 20px rgba(0,0,0,.08); border: 1px solid var(--line-2); }
.compare table { width: 100%; border-collapse: collapse; }
.compare th, .compare td { padding: 18px 24px; text-align: left; border-bottom: 1px solid var(--line-2); font-size: 13px; vertical-align: middle; }
.compare thead th { background: #334155; color: #fff; font-size: 14px; font-weight: 700; }
.compare thead th.th--us { background: var(--primary); }
.compare thead th.th--them { background: #475569; color: rgba(255,255,255,.72); }
.compare tbody tr:last-child th, .compare tbody tr:last-child td { border-bottom: 0; }
.compare tbody tr:nth-child(odd) { background: #FAFBFC; }
.compare tbody tr:nth-child(odd) td.td--us { background: var(--primary-50); }
.compare tbody tr:nth-child(even) td.td--us { background: #E8F2FB; }
.compare th { font-weight: 700; color: var(--ink-2); }
.compare td.td--us { text-align: center; color: var(--primary); font-weight: 700; font-size: 13px; }
.compare td.td--them { text-align: center; color: var(--ink-3); }
.compare .mark-good { display: inline-block; color: var(--success); font-weight: 900; font-size: 18px; margin-right: 6px; }
.compare .mark-bad { display: inline-block; color: var(--danger); font-weight: 900; font-size: 18px; margin-right: 6px; }
.compare .mark-meh { display: inline-block; color: #F59E0B; font-weight: 900; font-size: 18px; margin-right: 6px; }

.cases { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 48px; }
.case { background: #fff; border-radius: 20px; overflow: hidden; border: 1px solid var(--line); box-shadow: 0 1px 4px rgba(0,0,0,.06); display: flex; flex-direction: column; transition: transform .2s, box-shadow .2s; }
.case:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,.08); }
.case__thumbs { display: grid; grid-template-columns: 1.6fr 1fr; height: 176px; }
.case__thumb { background: linear-gradient(135deg, #E2ECF4, #CBD8E4); position: relative; overflow: hidden; display: grid; place-items: center; color: #7AAAC8; font-size: 10px; font-weight: 700; border-right: 1px solid rgba(255,255,255,.6); }
.case__thumb::after { content: ''; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, transparent 0 6px, rgba(255,255,255,.2) 6px 12px); pointer-events: none; }
.case__thumb .emoji { font-size: 28px; margin-bottom: 4px; position: relative; z-index: 1; }
.case__thumb .label { position: relative; z-index: 1; letter-spacing: .08em; }
.case__thumbsSide { display: grid; grid-template-rows: 1fr 1fr; }
.case__thumbsSide .case__thumb { border-left: 1px solid rgba(255,255,255,.6); border-bottom: 1px solid rgba(255,255,255,.6); }
.case__thumbsSide .case__thumb:last-child { border-bottom: 0; }
.case__tags { display: flex; gap: 6px; padding: 10px 14px; background: #FAFBFC; border-bottom: 1px solid var(--line-2); flex-wrap: wrap; }
.case__tag { font-size: 10px; font-weight: 700; color: var(--ink-3); padding: 4px 8px; border-radius: 999px; background: #fff; border: 1px solid var(--line-2); letter-spacing: .06em; }
.case__tag--active { background: var(--primary-50); color: var(--primary); border-color: var(--primary-200); }
.case__body { padding: 18px 20px 22px; display: flex; flex-direction: column; gap: 14px; flex: 1; }
.case__cat { font-size: 11px; color: var(--ink-3); font-weight: 700; }
.case__co { font-size: 18px; font-weight: 800; color: var(--ink); margin-top: -8px; }
.case__metric { background: linear-gradient(135deg, var(--primary), #0066B3); color: #fff; border-radius: 8px; padding: 9px 14px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 6px rgba(0,85,153,.25); }
.case__insight { background: var(--warm-bg); border: 1px solid var(--warm-ring); border-radius: 12px; padding: 12px 14px; display: flex; gap: 10px; font-size: 11.5px; color: var(--warm-ink); font-weight: 700; line-height: 1.7; }
.case__insight .ic { font-size: 14px; flex-shrink: 0; }
.case__note { font-size: 12px; color: var(--ink-3); line-height: 1.85; margin: 0; }
.case__outputs { border-top: 1px dashed var(--line); padding-top: 14px; margin-top: auto; }
.case__outputs h4 { margin: 0 0 10px; font-size: 10px; letter-spacing: .08em; color: var(--ink-3); font-weight: 700; }
.case__outputs ul { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: 6px; }
.case__outputs li { font-size: 11px; padding: 4px 10px; border-radius: 999px; background: var(--bg-2); color: var(--ink-2); font-weight: 700; }

.trouble { position: relative; overflow: hidden; color: #fff; padding: 92px 0;
  background: radial-gradient(ellipse at 85% 0%, rgba(255,107,43,.2), transparent 50%), radial-gradient(ellipse at 15% 100%, rgba(0,85,153,.35), transparent 55%), linear-gradient(160deg, #0A1628 0%, #0E1F3D 100%); }
.trouble::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px); background-size: 64px 64px; }
.trouble__inner { position: relative; }
.trouble__list { margin: 48px auto 0; max-width: 1032px; position: relative; padding-left: 72px; }
.trouble__line { position: absolute; left: 23px; top: 24px; bottom: 24px; width: 2px; background: linear-gradient(180deg, var(--accent), rgba(255,107,43,.3) 80%, transparent); }
.trouble-item { position: relative; display: grid; grid-template-columns: 1fr; margin-bottom: 32px; }
.trouble-item__bullet { position: absolute; left: -72px; top: 4px; width: 48px; height: 48px; border-radius: 50%; background: var(--accent); color: #fff; display: grid; place-items: center; font-size: 22px; border: 3px solid rgba(255,255,255,.15); box-shadow: 0 0 0 6px rgba(255,107,43,.15); }
.trouble-item__card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.14); border-radius: 18px; padding: 24px 28px; backdrop-filter: blur(4px); }
.trouble-tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: .1em; }
.trouble-tag--danger { background: rgba(220,38,38,.2); border: 1px solid rgba(220,38,38,.4); color: #FCA5A5; }
.trouble-item__quote { margin: 14px 0 18px; font-size: 16px; font-weight: 700; color: #fff; }
.trouble-item__body { display: grid; grid-template-columns: 1fr 24px 1fr; gap: 10px; align-items: stretch; }
.trouble-item__panel { border-radius: 12px; padding: 14px 18px; }
.trouble-item__panel h5 { margin: 0 0 6px; font-size: 10px; letter-spacing: .1em; font-weight: 700; }
.trouble-item__panel p { margin: 0; font-size: 12px; line-height: 1.75; }
.trouble-item__panel--before { background: rgba(220,38,38,.12); }
.trouble-item__panel--before h5 { color: #EF4444; }
.trouble-item__panel--before p { color: rgba(255,255,255,.72); }
.trouble-item__panel--after { background: rgba(22,163,74,.12); }
.trouble-item__panel--after h5 { color: #4ADE80; }
.trouble-item__panel--after p { color: rgba(255,255,255,.9); font-weight: 500; }
.trouble-item__arrow { display: grid; place-items: center; color: var(--accent); font-size: 20px; font-weight: 900; }
.trouble-item__tags { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
.trouble-item__tags span { font-size: 10px; padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,.08); color: rgba(255,255,255,.7); border: 1px solid rgba(255,255,255,.12); font-weight: 700; }
.trouble__summary { max-width: 1032px; margin: 32px auto 0; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14); border-radius: 18px; padding: 28px 32px; display: flex; justify-content: space-between; align-items: center; gap: 24px; }
.trouble__summary h3 { margin: 0 0 6px; font-size: 18px; font-weight: 800; color: #fff; line-height: 1.5; }
.trouble__summary p { margin: 0; font-size: 12px; color: rgba(255,255,255,.6); line-height: 1.8; }

.voice__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 48px; }
.voice { background: #fff; border-radius: 18px; border: 1px solid var(--line); box-shadow: 0 1px 4px rgba(0,0,0,.06); padding: 22px; display: flex; flex-direction: column; gap: 16px; }
.voice__ba { display: grid; grid-template-columns: 1fr 22px 1fr; gap: 4px; align-items: stretch; }
.voice__col { border-radius: 8px; padding: 14px; min-height: 176px; }
